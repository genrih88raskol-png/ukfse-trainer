<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UKFSE Trainer</title>

<style>
body{
font-family:Arial;
background:#0d1117;
color:white;
padding:20px;
text-align:center;
}

.card{
background:#161b22;
padding:20px;
border-radius:20px;
margin-top:20px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:12px;
background:#238636;
color:white;
}

.answer{
background:#30363d;
}

</style>
</head>

<body>

<h1>UKFSE Trainer</h1>

<div class="card" id="menu">

<h2>Choose Mode</h2>

<button onclick="startQuiz()">⚡ Quick Test</button>
<button onclick="startOral()">🎤 Oral Exam</button>
<button onclick="startScenario()">🚨 Emergency Scenarios</button>
<button>📊 Progress</button>
<button onclick="showMistakes()">❌ Mistakes</button>

</div>

<div id="quiz" style="display:none;" class="card">

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="result"></h3>

<button onclick="nextQuestion()">Next Question</button>

</div>

<script>

const questions=[

{
q:"Which survey issues a new certificate?",
a:["Annual Survey","Renewal Survey","Intermediate Survey","Additional Survey"],
correct:1
},

{
q:"Cargo ship over 500 GT requires:",
a:[
"Passenger Ship Safety Certificate",
"Cargo Ship Safety Equipment Certificate",
"Fishing Vessel Certificate",
"Safe Manning only"
],
correct:1
},

{
q:"STCW Manila amendments introduced:",
a:[
"Training standards",
"Food requirements",
"Load line rules",
"Pilotage rules"
],
correct:0
},

{
q:"Who issues Passenger Ship Safety Certificate?",
a:[
"Port State Control",
"Marine Safety Agency",
"Shipowner",
"Master"
],
correct:1
},

{
q:"What does ISM Code mainly cover?",
a:[
"Safety Management",
"Cargo loading",
"Pilotage",
"Fishing operations"
],
correct:0
},

{
q:"What does ISPS Code relate to?",
a:[
"Security",
"Medical care",
"Pollution",
"Accommodation"
],
correct:0
},

{
q:"What document must be available onboard if employment agreement is not in English?",
a:[
"Crew list",
"Official Log Book",
"English translation",
"Medical certificate"
],
correct:2
},

{
q:"How many HSSC survey types exist?",
a:[
"5",
"6",
"7",
"8"
],
correct:2
}

];

let current=0;
let score=0;
let mistakes=[];

function startQuiz(){

document.getElementById("menu").style.display="none";

document.getElementById("quiz").style.display="block";

showQuestion();

}

function showQuestion(){

document.getElementById("result").innerHTML="";

let q=questions[current];

document.getElementById("question").innerHTML=q.q;

let html="";

q.a.forEach((answer,index)=>{

html+=`<button class='answer'
onclick='check(${index})'>
${answer}
</button>`;

});

document.getElementById("answers").innerHTML=html;

}

function check(answer){

let q=questions[current];

if(answer===q.correct){

score++;

document.getElementById("result").innerHTML=
"✅ Correct | Score: "+score+"/"+questions.length;

}else{

mistakes.push(q.q);

document.getElementById("result").innerHTML=
"❌ Wrong<br><br>Correct answer: "
+q.a[q.correct]+
"<br><br>Score: "
+score+"/"+questions.length;

}

}

function nextQuestion(){

current++;

if(current>=questions.length){

current=0;

}

showQuestion();

}
function showMistakes(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("question").innerHTML="❌ Mistakes";

if(mistakes.length===0){

document.getElementById("answers").innerHTML=
"<p>No mistakes yet ✅</p>";

}else{

let html="";

mistakes.forEach((m,i)=>{

html+="<p>"+(i+1)+". "+m+"</p>";

});

document.getElementById("answers").innerHTML=html;

}

document.getElementById("result").innerHTML="";

}
const oralQuestions=[
{
q:"Captain, explain the difference between Annual Survey and Renewal Survey.",
key:["annual survey is general inspection","renewal survey leads to new certificate","checks condition and compliance"]
},
{
q:"Captain, what does the ISM Code require from the company?",
key:["safety management system","document of compliance","safety management certificate","emergency procedures"]
},
{
q:"Captain, what is the purpose of the ISPS Code?",
key:["ship security","prevent illegal acts","ship security plan","ship security assessment"]
}
];

function startOral(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

let q=oralQuestions[Math.floor(Math.random()*oralQuestions.length)];

document.getElementById("question").innerHTML=q.q;

document.getElementById("answers").innerHTML=
"<textarea id='oralAnswer' style='width:100%;height:140px;border-radius:12px;font-size:16px;padding:10px;'></textarea>"+
"<button onclick='checkOral()'>Check My Answer</button>";

window.currentOral=q;

document.getElementById("result").innerHTML="";
}

function checkOral(){

let answer=document.getElementById("oralAnswer").value.toLowerCase();
let q=window.currentOral;
let found=0;
let missed=[];

q.key.forEach(k=>{
if(answer.includes(k.split(" ")[0])){
found++;
}else{
missed.push(k);
}
});

document.getElementById("result").innerHTML=
"Score: "+found+"/"+q.key.length+
"<br><br>Missed points:<br>"+missed.join("<br>");

}
const scenarios=[

{
title:"Missing Crew Member",
question:"Crew member missing before departure. What actions would you take?",
points:[
"organize search teams",
"inform company",
"inform port authorities",
"check safe manning",
"change crew list",
"arrange replacement crew"
]
},

{
title:"Fire in Engine Room",
question:"Fire in engine room. Immediate actions?",
points:[
"general alarm",
"muster station",
"assess fire",
"boundary cooling",
"fire fighting",
"inform involved parties"
]
},

{
title:"Oil Pollution",
question:"Oil leak overboard. Actions?",
points:[
"stop operation",
"assess leak",
"activate sopep",
"inform authorities",
"contain pollution",
"repair source"
]
}

];

function startScenario(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

let s=scenarios[Math.floor(Math.random()*scenarios.length)];

window.currentScenario=s;

document.getElementById("question").innerHTML=
"🚨 "+s.title+"<br><br>"+s.question;

document.getElementById("answers").innerHTML=
"<textarea id='scenarioAnswer' style='width:100%;height:150px;border-radius:12px;padding:10px;'></textarea>"+
"<button onclick='checkScenario()'>Submit</button>";

document.getElementById("result").innerHTML="";
}

function checkScenario(){

let answer=
document.getElementById("scenarioAnswer")
.value.toLowerCase();

let s=window.currentScenario;

let found=0;
let missed=[];

s.points.forEach(p=>{

if(answer.includes(p.split(" ")[0])){

found++;

}else{

missed.push(p);

}

});

document.getElementById("result").innerHTML=
"Score: "+found+"/"+s.points.length+
"<br><br>Missing points:<br>"+
missed.join("<br>");

}
</script>

</body>
</html>
