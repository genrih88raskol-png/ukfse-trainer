<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UKFSE Trainer</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0d1117;
color:white;
padding:20px;
text-align:center;
}
h1{font-size:42px;margin-top:40px;}
.card{
background:#161b22;
padding:22px;
border-radius:24px;
margin-top:25px;
}
button{
width:100%;
padding:16px;
margin:10px 0;
font-size:20px;
border:none;
border-radius:14px;
background:#238636;
color:white;
}
.answer{background:#30363d;}
textarea{
width:92%;
height:150px;
border-radius:12px;
font-size:17px;
padding:12px;
}
p{font-size:20px;line-height:1.4;}
</style>
</head>

<body>

<h1>UKFSE Trainer</h1>

<div class="card" id="menu">
<h2>Choose Mode</h2>
<button onclick="showStudy()">📚 Study Mode</button>
<button onclick="startQuiz()">⚡ Quick Test</button>
<button onclick="startExam()">🎓 Full Exam</button>
<button onclick="startOral()">🎤 Oral Exam</button>
<button onclick="startScenario()">🚨 Emergency Scenarios</button>
<button onclick="showProgress()">📊 Progress</button>
<button onclick="showMistakes()">❌ Mistakes</button>
</div>

<div id="quiz" style="display:none;" class="card">
<h2 id="question"></h2>
<div id="answers"></div>
<h3 id="result"></h3>
<button id="nextBtn" onclick="nextQuestion()">Next Question</button>
<button onclick="backToMenu()">⬅️ Back to Menu</button>
</div>

<script>
const questions=[
{q:"Which survey issues a new certificate?",a:["Annual Survey","Renewal Survey","Intermediate Survey","Additional Survey"],correct:1,topic:"survey"},
{q:"How many HSSC survey types exist?",a:["5","6","7","8"],correct:2,topic:"survey"},
{q:"Which survey is a complete inspection before ship enters service?",a:["Annual","Initial","Intermediate","Periodical"],correct:1,topic:"survey"},
{q:"Which survey is made after important repairs or renewals?",a:["Additional","Annual","Periodical","Bottom"],correct:0,topic:"survey"},
{q:"Cargo ship over 300 GT on international voyages requires:",a:["Cargo Ship Safety Radio Certificate","Passenger Ship Safety Certificate","MLC only","ISM DOC only"],correct:0,topic:"certificates"},
{q:"Cargo ship over 500 GT on international voyages requires:",a:["Cargo Ship Safety Equipment Certificate","Fishing Certificate","Safe Manning only","Port Clearance"],correct:0,topic:"certificates"},
{q:"Passenger Ship Safety Certificate validity under HSSC is normally:",a:["5 years","1 year","3 months","Unlimited"],correct:1,topic:"certificates"},
{q:"What does ISM Code mainly cover?",a:["Safety Management","Cargo loading","Pilotage","Fishing operations"],correct:0,topic:"ism"},
{q:"Company must hold under ISM:",a:["Document of Compliance","Certificate of Registry only","Crew List only","Loadline Plan"],correct:0,topic:"ism"},
{q:"Ship must carry under ISM:",a:["SMC and copy of DOC","Only passport copies","Only crew contracts","Only port clearance"],correct:0,topic:"ism"},
{q:"What does ISPS Code relate to?",a:["Security","Medical care","Pollution","Accommodation"],correct:0,topic:"isps"},
{q:"Ship Security Plan for UK ships must be approved by:",a:["MCA","Port Agent","P&I Club","Charterer"],correct:0,topic:"isps"},
{q:"SSAS is part of:",a:["ISPS Code","MLC","Load Line","COLREG"],correct:0,topic:"isps"},
{q:"Minimum age to work onboard under MLC UK rules:",a:["14","15","16","18"],correct:2,topic:"mlc"},
{q:"Young seafarers under 18 generally must not work:",a:["At night","On deck","In port","With officers"],correct:0,topic:"mlc"},
{q:"Minimum notice period for SEA termination is normally:",a:["24 hours","3 days","7 days","1 month"],correct:2,topic:"mlc"},
{q:"If SEA is not in English, what must be onboard?",a:["English translation","Extra crew list","New passport","Medical log"],correct:0,topic:"mlc"},
{q:"Late payment of wages may attract interest of:",a:["5% per year","10% per year","20% per year","50% per year"],correct:2,topic:"mlc"},
{q:"Crew accommodation inspection interval:",a:["Every 7 days","Every month","Every 6 months","Only drydock"],correct:0,topic:"mlc"},
{q:"Food and drinking water inspection interval:",a:["Not less than once a week","Every day only","Every 3 months","Only after complaint"],correct:0,topic:"mlc"},
{q:"Official Log Book drill entries must be signed by:",a:["Master and one crew member","Agent only","Cook only","Chief Engineer only"],correct:0,topic:"olb"},
{q:"Steering gear must be tested:",a:["Within 12 hours before sailing","Once per year","Only in drydock","After arrival only"],correct:0,topic:"olb"},
{q:"OLB normally closes:",a:["6 months after first entry","Every week","Every year","Only when sold"],correct:0,topic:"olb"},
{q:"MAIB accident report should be sent within:",a:["24 hours","7 days","14 days","1 month"],correct:0,topic:"maib"},
{q:"Serious injury report may be sent within:",a:["14 days","24 hours","6 months","1 year"],correct:0,topic:"maib"},
{q:"Evidence after accident must be preserved for up to:",a:["28 days unless released","3 days","7 days","1 year always"],correct:0,topic:"maib"}
];

let current=0;
let score=0;
let mistakes=[];

function hideNext(){document.getElementById("nextBtn").style.display="none";}
function showNext(){document.getElementById("nextBtn").style.display="block";}

function backToMenu(){
document.getElementById("quiz").style.display="none";
document.getElementById("menu").style.display="block";
showNext();
}

function startQuiz(){
showNext();
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
current=Math.floor(Math.random()*questions.length);
showQuestion();
}

function showQuestion(){
showNext();
document.getElementById("result").innerHTML="";
let q=questions[current];
document.getElementById("question").innerHTML=q.q;
let html="";
q.a.forEach((answer,index)=>{
html+=`<button class='answer' onclick='check(${index})'>${answer}</button>`;
});
document.getElementById("answers").innerHTML=html;
}

function check(answer){
let q=questions[current];
if(answer===q.correct){
score++;
document.getElementById("result").innerHTML="✅ Correct | Score: "+score+"/"+questions.length;
}else{
mistakes.push(q.q);
document.getElementById("result").innerHTML="❌ Wrong<br><br>Correct answer: "+q.a[q.correct]+"<br><br>Score: "+score+"/"+questions.length;
}
}

function nextQuestion(){
current=Math.floor(Math.random()*questions.length);
showQuestion();
}

function showMistakes(){
hideNext();
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
document.getElementById("question").innerHTML="❌ Mistakes";
if(mistakes.length===0){
document.getElementById("answers").innerHTML="<p>No mistakes yet ✅</p>";
}else{
let html="";
mistakes.forEach((m,i)=>{html+="<p>"+(i+1)+". "+m+"</p>";});
document.getElementById("answers").innerHTML=html;
}
document.getElementById("result").innerHTML="";
}

function showProgress(){
hideNext();
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
let percent=Math.round((score/questions.length)*100);
document.getElementById("question").innerHTML="📊 Progress";
document.getElementById("answers").innerHTML=
"<p>Total Questions: "+questions.length+"</p>"+
"<p>Current Score: "+score+"/"+questions.length+"</p>"+
"<p>Progress: "+percent+"%</p>"+
"<p>Mistakes: "+mistakes.length+"</p>";
document.getElementById("result").innerHTML="";
}

function startExam(){
hideNext();
score=0;
let examQuestions=[...questions].sort(()=>0.5-Math.random()).slice(0,10);
let examIndex=0;
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

function showExam(){
let q=examQuestions[examIndex];
document.getElementById("result").innerHTML="";
document.getElementById("question").innerHTML="Question "+(examIndex+1)+"/10<br><br>"+q.q;
let html="";
q.a.forEach((answer,index)=>{
html+=`<button class='answer' onclick='checkExam(${index})'>${answer}</button>`;
});
document.getElementById("answers").innerHTML=html;
}

window.checkExam=function(answer){
let q=examQuestions[examIndex];
if(answer===q.correct){score++;}
else{mistakes.push(q.q);}
examIndex++;
if(examIndex>=examQuestions.length){
document.getElementById("question").innerHTML="🎓 Exam Finished";
document.getElementById("answers").innerHTML="<h2>Score: "+score+"/10</h2>";
document.getElementById("result").innerHTML="";
return;
}
showExam();
}
showExam();
}

const oralQuestions=[
{q:"Captain, explain the difference between Annual Survey and Renewal Survey.",key:["annual","renewal","certificate"]},
{q:"Captain, what does the ISM Code require from the company?",key:["safety","management","doc","smc"]},
{q:"Captain, what is the purpose of the ISPS Code?",key:["security","ship","plan","assessment"]}
];

function startOral(){
hideNext();
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
let q=oralQuestions[Math.floor(Math.random()*oralQuestions.length)];
window.currentOral=q;
document.getElementById("question").innerHTML=q.q;
document.getElementById("answers").innerHTML="<textarea id='oralAnswer'></textarea><button onclick='checkOral()'>Check My Answer</button>";
document.getElementById("result").innerHTML="";
}

function checkOral(){
let answer=document.getElementById("oralAnswer").value.toLowerCase();
let q=window.currentOral;
let found=0;
let missed=[];
q.key.forEach(k=>{
if(answer.includes(k)){found++;}else{missed.push(k);}
});
document.getElementById("result").innerHTML="Score: "+found+"/"+q.key.length+"<br><br>Missed points:<br>"+missed.join("<br>");
}

const scenarios=[
{title:"Missing Crew Member",question:"Crew member missing before departure. What actions would you take?",points:["search","company","port","safe manning","crew list","replacement"]},
{title:"Fire in Engine Room",question:"Fire in engine room. Immediate actions?",points:["alarm","muster","assess","boundary cooling","fire fighting","inform"]},
{title:"Oil Pollution",question:"Oil leak overboard. Actions?",points:["stop","assess","sopep","inform","contain","repair"]}
];

function startScenario(){
hideNext();
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
let s=scenarios[Math.floor(Math.random()*scenarios.length)];
window.currentScenario=s;
document.getElementById("question").innerHTML="🚨 "+s.title+"<br><br>"+s.question;
document.getElementById("answers").innerHTML="<textarea id='scenarioAnswer'></textarea><button onclick='checkScenario()'>Submit</button>";
document.getElementById("result").innerHTML="";
}

function checkScenario(){
let answer=document.getElementById("scenarioAnswer").value.toLowerCase();
let s=window.currentScenario;
let found=0;
let missed=[];
s.points.forEach(p=>{
if(answer.includes(p)){found++;}else{missed.push(p);}
});
document.getElementById("result").innerHTML="Score: "+found+"/"+s.points.length+"<br><br>Missing points:<br>"+missed.join("<br>");
}

const studyData={
surveys:[
"HSSC has 7 survey types: Initial, Periodical, Renewal, Intermediate, Annual, Bottom Inspection and Additional Survey.",

"Initial Survey: complete inspection before the ship enters service. It checks the items related to the certificate.",

"Periodical Survey: inspection of all items relating to a certificate to confirm satisfactory condition and fitness for service.",

"Renewal Survey: similar to a periodical survey, but it leads to the issue of a new certificate.",

"Intermediate Survey: inspection of specified items, usually around the second or third anniversary depending on certificate type.",

"Annual Survey: general inspection to ensure the ship and equipment have been maintained and remain satisfactory.",

"Bottom Inspection: inspection of underwater part of the ship and related items. Cargo ships require minimum two inspections in any 5-year period.",

"Additional Survey: carried out after repair, investigation, important repair or renewal. It may be general or partial.",

"Passenger Ship Safety Certificate is normally renewed annually.",

"Most other HSSC certificates have a maximum validity of 5 years.",

"Cargo ship 300 GT or more on international voyages requires Cargo Ship Safety Radio Certificate.",

"Cargo ship 500 GT or more on international voyages requires Cargo Ship Safety Equipment Certificate and Cargo Ship Safety Construction Certificate.",

"Exam memory: Renewal = new certificate. Annual = general check. Initial = before service. Additional = after repair."
],
ism:[

"ISM = International Safety Management Code.",

"Purpose: ensure safety at sea, prevent human injury and avoid damage to environment and property.",

"SMS should define authority and responsibility of personnel.",

"SMS should include reporting of accidents and non-conformities.",

"SMS should include internal audits and management reviews.",

"Company receives Document of Compliance (DOC).",

"Ship receives Safety Management Certificate (SMC).",

"DOC confirms the company complies with ISM requirements.",

"SMC confirms ship operates according to approved SMS.",

"Major non-conformity may lead to suspension of certificates.",

],

"ISPS Code relates to maritime security.",
"Purpose: prevent unlawful acts against ships, crew and passengers.",
"Every ship/company must have a Ship Security Plan.",
"Ship Security Assessment supports the Ship Security Plan.",
"SSAS is a covert alert system under ISPS."
],

"MLC = Maritime Labour Convention.",

"Purpose: protect seafarers' working and living conditions worldwide.",

"MLC covers minimum requirements for seafarers to work onboard ships.",

"MLC covers conditions of employment.",

"MLC covers accommodation, recreational facilities, food and catering.",

"MLC covers welfare and social protection.",

"Minimum age for work onboard is generally 16 years.",

],
stcw:[

"STCW = Standards of Training, Certification and Watchkeeping for Seafarers.",

"2010 Manila Amendments introduced updated training requirements.",

"Amendments introduced refresher training requirements.",

"Amendments introduced requirements for security training.",

"Amendments introduced ECDIS training requirements.",

"Amendments introduced updated medical fitness requirements.",

"Amendments introduced updated competency standards.",

"UKFSE memory: Manila = rest, security, ECDIS, refresher training."

],
  
maib:[
"MAIB means Marine Accident Investigation Branch.",
"Reportable accidents should be reported by quickest means, normally within 24 hours.",
"Serious injuries may be reported within 14 days.",
"Evidence must be preserved after an accident.",
"IRF can be used to report or amplify accident information."
]
};

let currentTopic="";
let currentSlide=0;

function showStudy(){
hideNext();
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
document.getElementById("question").innerHTML="📚 Study Mode";
document.getElementById("answers").innerHTML=
"<button onclick='studyTopic(\"surveys\")'>Surveys & Certificates</button>"+
"<button onclick='studyTopic(\"ism\")'>ISM Code</button>"+
"<button onclick='studyTopic(\"isps\")'>ISPS Code</button>"+
"<button onclick='studyTopic(\"mlc\")'>MLC</button>"+
"<button onclick='studyTopic(\"maib\")'>MAIB Reporting</button>";
<button onclick='studyTopic("stcw")'>STCW Manila</button>
document.getElementById("result").innerHTML="";
}

function studyTopic(topic){
currentTopic=topic;
currentSlide=0;
showSlide();
}

function showSlide(){
hideNext();
let slides=studyData[currentTopic];
document.getElementById("question").innerHTML="📚 "+currentTopic.toUpperCase()+"<br><br>Slide "+(currentSlide+1)+"/"+slides.length;
document.getElementById("answers").innerHTML=
"<p>"+slides[currentSlide]+"</p>"+
"<button onclick='prevSlide()'>⬅ Previous</button>"+
"<button onclick='nextSlide()'>Next ➡</button>";
document.getElementById("result").innerHTML="";
}

function nextSlide(){
if(currentSlide<studyData[currentTopic].length-1){
currentSlide++;
showSlide();
}
}

function prevSlide(){
if(currentSlide>0){
currentSlide--;
showSlide();
}
}
</script>

</body>
</html>
