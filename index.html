<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UKFSE Trainer</title>

<style>
body{
font-family:Arial;
background:#0d1117;
color:white;
padding:20px;
text-align:center;
}

.card{
background:#161b22;
padding:20px;
border-radius:20px;
margin-top:20px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:12px;
background:#238636;
color:white;
}

.answer{
background:#30363d;
}

</style>
</head>

<body>

<h1>UKFSE Trainer</h1>

<div class="card" id="menu">

<h2>Choose Mode</h2>

<button onclick="showThemeTests()">🧩 Theme Tests</button>
<button onclick="showStudy()">📚 Study Mode</button>
<button onclick="startQuiz()">⚡ Quick Test</button>
<button onclick="startExam()">🎓 Full Exam</button>
<button onclick="startScenario()">🚨 Emergency Scenarios</button>
<button onclick="showProgress()">📊 Progress</button>
<button onclick="showMistakes()">❌ Mistakes</button>

</div>

<div id="quiz" style="display:none;" class="card">

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="result"></h3>

<button onclick="nextQuestion()">Next Question</button>
<button onclick="backToMenu()">⬅️ Back to Menu</button>

</div>

<script>

const questions=[

{q:"Which survey issues a new certificate?",a:["Annual Survey","Renewal Survey","Intermediate Survey","Additional Survey"],correct:1},
{q:"How many HSSC survey types exist?",a:["5","6","7","8"],correct:2},
{q:"Which survey is a complete inspection before ship enters service?",a:["Annual","Initial","Intermediate","Periodical"],correct:1},
{q:"Which survey is made after important repairs or renewals?",a:["Additional","Annual","Periodical","Bottom"],correct:0},

{q:"Cargo ship over 300 GT on international voyages requires:",a:["Cargo Ship Safety Radio Certificate","Passenger Ship Safety Certificate","MLC only","ISM DOC only"],correct:0},
{q:"Cargo ship over 500 GT on international voyages requires:",a:["Cargo Ship Safety Equipment Certificate","Fishing Certificate","Safe Manning only","Port Clearance"],correct:0},
{q:"Passenger Ship Safety Certificate validity under HSSC is normally:",a:["5 years","1 year","3 months","Unlimited"],correct:1},

{q:"What does ISM Code mainly cover?",a:["Safety Management","Cargo loading","Pilotage","Fishing operations"],correct:0},
{q:"Company must hold under ISM:",a:["Document of Compliance","Certificate of Registry only","Crew List only","Loadline Plan"],correct:0},
{q:"Ship must carry under ISM:",a:["SMC and copy of DOC","Only passport copies","Only crew contracts","Only port clearance"],correct:0},

{q:"What does ISPS Code relate to?",a:["Security","Medical care","Pollution","Accommodation"],correct:0},
{q:"Ship Security Plan for UK ships must be approved by:",a:["MCA","Port Agent","P&I Club","Charterer"],correct:0},
{q:"SSAS is part of:",a:["ISPS Code","MLC","Load Line","COLREG"],correct:0},

{q:"Minimum age to work onboard under MLC UK rules:",a:["14","15","16","18"],correct:2},
{q:"Young seafarers under 18 generally must not work:",a:["At night","On deck","In port","With officers"],correct:0},
{q:"Minimum notice period for SEA termination is normally:",a:["24 hours","3 days","7 days","1 month"],correct:2},

{q:"If SEA is not in English, what must be onboard?",a:["English translation","Extra crew list","New passport","Medical log"],correct:0},
{q:"Late payment of wages may attract interest of:",a:["5% per year","10% per year","20% per year","50% per year"],correct:2},
{q:"Crew accommodation inspection interval:",a:["Every 7 days","Every month","Every 6 months","Only drydock"],correct:0},
{q:"Food and drinking water inspection interval:",a:["Not less than once a week","Every day only","Every 3 months","Only after complaint"],correct:0},

{q:"Official Log Book drill entries must be signed by:",a:["Master and one crew member","Agent only","Cook only","Chief Engineer only"],correct:0},
{q:"Steering gear must be tested:",a:["Within 12 hours before sailing","Once per year","Only in drydock","After arrival only"],correct:0},
{q:"OLB normally closes:",a:["6 months after first entry","Every week","Every year","Only when sold"],correct:0},

{q:"MAIB accident report should be sent within:",a:["24 hours","7 days","14 days","1 month"],correct:0},
{q:"Serious injury report may be sent within:",a:["14 days","24 hours","6 months","1 year"],correct:0},
{q:"Evidence after accident must be preserved for up to:",a:["28 days unless released","3 days","7 days","1 year always"],correct:0}

];

let questionsBackup=[];
let current=0;
let score=0;
let mistakes=[];

function startQuiz(){

document.getElementById("menu").style.display="none";

document.getElementById("quiz").style.display="block";
current=Math.floor(Math.random()*questions.length);
showQuestion();

}

function showQuestion(){

document.getElementById("result").innerHTML="";

let q=questions[current];

document.getElementById("question").innerHTML=q.q;

let html="";

q.a.forEach((answer,index)=>{

html+=`<button class='answer'
onclick='check(${index})'>
${answer}
</button>`;

});

document.getElementById("answers").innerHTML=html;

}

function check(answer){

let q=questions[current];

if(answer===q.correct){

score++;

document.getElementById("result").innerHTML=
"✅ Correct | Score: "+score+"/"+questions.length;

}else{

mistakes.push(q.q);

document.getElementById("result").innerHTML=
"❌ Wrong<br><br>Correct answer: "
+q.a[q.correct]+
"<br><br>Score: "
+score+"/"+questions.length;

}

}

function nextQuestion(){

current=Math.floor(Math.random()*questions.length);

showQuestion();

}
function showMistakes(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("question").innerHTML="❌ Mistakes";

if(mistakes.length===0){

document.getElementById("answers").innerHTML=
"<p>No mistakes yet ✅</p>";

}else{

let html="";

mistakes.forEach((m,i)=>{

html+="<p>"+(i+1)+". "+m+"</p>";

});

document.getElementById("answers").innerHTML=html;

}

document.getElementById("result").innerHTML="";

}
const oralQuestions=[
{
q:"Captain, explain the difference between Annual Survey and Renewal Survey.",
key:["annual survey is general inspection","renewal survey leads to new certificate","checks condition and compliance"]
},
{
q:"Captain, what does the ISM Code require from the company?",
key:["safety management system","document of compliance","safety management certificate","emergency procedures"]
},
{
q:"Captain, what is the purpose of the ISPS Code?",
key:["ship security","prevent illegal acts","ship security plan","ship security assessment"]
}
];

function startOral(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

let q=oralQuestions[Math.floor(Math.random()*oralQuestions.length)];

document.getElementById("question").innerHTML=q.q;

document.getElementById("answers").innerHTML=
"<textarea id='oralAnswer' style='width:100%;height:140px;border-radius:12px;font-size:16px;padding:10px;'></textarea>"+
"<button onclick='checkOral()'>Check My Answer</button>";

window.currentOral=q;

document.getElementById("result").innerHTML="";
}

function checkOral(){

let answer=document.getElementById("oralAnswer").value.toLowerCase();
let q=window.currentOral;
let found=0;
let missed=[];

q.key.forEach(k=>{
if(answer.includes(k.split(" ")[0])){
found++;
}else{
missed.push(k);
}
});

document.getElementById("result").innerHTML=
"Score: "+found+"/"+q.key.length+
"<br><br>Missed points:<br>"+missed.join("<br>");

}
const scenarios=[

{
title:"Missing Crew Member",
question:"Crew member missing before departure. What actions would you take?",
points:[
"organize search teams",
"inform company",
"inform port authorities",
"check safe manning",
"change crew list",
"arrange replacement crew"
]
},

{
title:"Fire in Engine Room",
question:"Fire in engine room. Immediate actions?",
points:[
"general alarm",
"muster station",
"assess fire",
"boundary cooling",
"fire fighting",
"inform involved parties"
]
},

{
title:"Oil Pollution",
question:"Oil leak overboard. Actions?",
points:[
"stop operation",
"assess leak",
"activate sopep",
"inform authorities",
"contain pollution",
"repair source"
]
}

];

function startScenario(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

let s=scenarios[Math.floor(Math.random()*scenarios.length)];

window.currentScenario=s;

document.getElementById("question").innerHTML=
"🚨 "+s.title+"<br><br>"+s.question;

document.getElementById("answers").innerHTML=
"<textarea id='scenarioAnswer' style='width:100%;height:150px;border-radius:12px;padding:10px;'></textarea>"+
"<button onclick='checkScenario()'>Submit</button>";

document.getElementById("result").innerHTML="";
}

function checkScenario(){

let answer=
document.getElementById("scenarioAnswer")
.value.toLowerCase();

let s=window.currentScenario;

let found=0;
let missed=[];

s.points.forEach(p=>{

if(answer.includes(p.split(" ")[0])){

found++;

}else{

missed.push(p);

}

});

document.getElementById("result").innerHTML=
"Score: "+found+"/"+s.points.length+
"<br><br>Missing points:<br>"+
missed.join("<br>");

}
function showProgress(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

let percent=Math.round((score/questions.length)*100);

document.getElementById("question").innerHTML="📊 Progress";

document.getElementById("answers").innerHTML=
"<p>Total Questions: "+questions.length+"</p>"+
"<p>Current Score: "+score+"/"+questions.length+"</p>"+
"<p>Progress: "+percent+"%</p>"+
"<p>Mistakes: "+mistakes.length+"</p>"+
"<button onclick='backToMenu()'>Back to Menu</button>";

document.getElementById("result").innerHTML="";

}

function backToMenu(){

document.getElementById("quiz").style.display="none";
document.getElementById("menu").style.display="block";

}
 let examMode=false;
let examQuestions=[];
let examIndex=0;

function startExam(){

examMode=true;

score=0;

examIndex=0;

examQuestions=[...questions]
.sort(()=>0.5-Math.random())
.slice(0,10);

document.getElementById("menu").style.display="none";

document.getElementById("quiz").style.display="block";

showExamQuestion();

}

function showExamQuestion(){

document.getElementById("result").innerHTML="";

let q=examQuestions[examIndex];

document.getElementById("question").innerHTML=
"Question "+(examIndex+1)+"/10<br><br>"+q.q;

let html="";

q.a.forEach((answer,index)=>{

html+=`<button class='answer'
onclick='checkExam(${index})'>
${answer}
</button>`;

});

document.getElementById("answers").innerHTML=html;

}

function checkExam(answer){

let q=examQuestions[examIndex];

if(answer===q.correct){

score++;

}

examIndex++;

if(examIndex>=examQuestions.length){

document.getElementById("question").innerHTML=
"🎓 Exam Finished";

document.getElementById("answers").innerHTML=
"<h2>Score: "+score+"/10</h2>";

document.getElementById("result").innerHTML="";

return;

}

showExamQuestion();

} 
function showStudy(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("question").innerHTML="📚 Study Mode";

document.getElementById("answers").innerHTML=
"<button onclick='studyTopic(\"surveys\")'>Surveys & Certificates</button>"+
"<button onclick='studyTopic(\"ism\")'>ISM Code</button>"+
"<button onclick='studyTopic(\"isps\")'>ISPS Code</button>"+
"<button onclick='studyTopic(\"mlc\")'>MLC</button>"+
"<button onclick='studyTopic(\"maib\")'>MAIB Reporting</button>";

document.getElementById("result").innerHTML="";

}

function studyTopic(topic){

let text="";

if(topic==="surveys"){
text="HSSC has 7 survey types: Initial, Periodical, Renewal, Intermediate, Annual, Bottom Inspection and Additional Survey. Renewal survey leads to a new certificate.";
}

if(topic==="ism"){
text="ISM Code requires a Safety Management System, Document of Compliance for the company, Safety Management Certificate for the ship, emergency procedures and internal audits.";
}

if(topic==="isps"){
text="ISPS Code relates to ship and port facility security. Key documents include Ship Security Plan, Ship Security Assessment and Ship Security Alert System.";
}

if(topic==="mlc"){
text="MLC covers seafarer employment, wages, repatriation, medical care, food, accommodation, minimum age and working/living conditions.";
}

if(topic==="maib"){
text="Accidents must be reported to MAIB by the quickest means available, normally within 24 hours. Evidence must be preserved.";
}

document.getElementById("question").innerHTML="📚 "+topic.toUpperCase();

document.getElementById("answers").innerHTML="<p>"+text+"</p>";

document.getElementById("result").innerHTML="";
} 
function showThemeTests(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("question").innerHTML="🧩 Theme Tests";

document.getElementById("answers").innerHTML=
"<button onclick='startTheme(\"survey\")'>Surveys</button>"+
"<button onclick='startTheme(\"ism\")'>ISM</button>"+
"<button onclick='startTheme(\"isps\")'>ISPS</button>"+
"<button onclick='startTheme(\"mlc\")'>MLC</button>"+
"<button onclick='startTheme(\"maib\")'>MAIB</button>";

document.getElementById("result").innerHTML="";
}

function startTheme(theme){

let filtered=questions.filter(q=>q.topic===theme);

if(filtered.length===0){
document.getElementById("question").innerHTML="No questions yet";
document.getElementById("answers").innerHTML="";
return;
}

questionsBackup=questions;
questions=filtered;
current=Math.floor(Math.random()*questions.length);
showQuestion();

} 
</script>

</body>
</html>
