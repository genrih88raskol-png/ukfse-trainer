<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UKFSE Trainer</title>

<style>
body{
font-family:Arial;
background:#0d1117;
color:white;
padding:20px;
text-align:center;
}

.card{
background:#161b22;
padding:20px;
border-radius:20px;
margin-top:20px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:12px;
background:#238636;
color:white;
}

.answer{
background:#30363d;
}

</style>
</head>

<body>

<h1>UKFSE Trainer</h1>

<div class="card" id="menu">

<h2>Choose Mode</h2>

<button onclick="startQuiz()">⚡ Quick Test</button>
<button>🎤 Oral Exam</button>
<button>🚨 Emergency Scenarios</button>
<button>📊 Progress</button>
<button onclick="showMistakes()">❌ Mistakes</button>

</div>

<div id="quiz" style="display:none;" class="card">

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="result"></h3>

<button onclick="nextQuestion()">Next Question</button>

</div>

<script>

const questions=[

{
q:"Which survey issues a new certificate?",
a:["Annual Survey","Renewal Survey","Intermediate Survey","Additional Survey"],
correct:1
},

{
q:"Cargo ship over 500 GT requires:",
a:[
"Passenger Ship Safety Certificate",
"Cargo Ship Safety Equipment Certificate",
"Fishing Vessel Certificate",
"Safe Manning only"
],
correct:1
},

{
q:"STCW Manila amendments introduced:",
a:[
"Training standards",
"Food requirements",
"Load line rules",
"Pilotage rules"
],
correct:0
},

{
q:"Who issues Passenger Ship Safety Certificate?",
a:[
"Port State Control",
"Marine Safety Agency",
"Shipowner",
"Master"
],
correct:1
},

{
q:"What does ISM Code mainly cover?",
a:[
"Safety Management",
"Cargo loading",
"Pilotage",
"Fishing operations"
],
correct:0
},

{
q:"What does ISPS Code relate to?",
a:[
"Security",
"Medical care",
"Pollution",
"Accommodation"
],
correct:0
},

{
q:"What document must be available onboard if employment agreement is not in English?",
a:[
"Crew list",
"Official Log Book",
"English translation",
"Medical certificate"
],
correct:2
},

{
q:"How many HSSC survey types exist?",
a:[
"5",
"6",
"7",
"8"
],
correct:2
}

];

let current=0;
let score=0;
let mistakes=[];

function startQuiz(){

document.getElementById("menu").style.display="none";

document.getElementById("quiz").style.display="block";

showQuestion();

}

function showQuestion(){

document.getElementById("result").innerHTML="";

let q=questions[current];

document.getElementById("question").innerHTML=q.q;

let html="";

q.a.forEach((answer,index)=>{

html+=`<button class='answer'
onclick='check(${index})'>
${answer}
</button>`;

});

document.getElementById("answers").innerHTML=html;

}

function check(answer){

let q=questions[current];

if(answer===q.correct){

score++;

document.getElementById("result").innerHTML=
"✅ Correct | Score: "+score+"/"+questions.length;

}else{

mistakes.push(q.q);

document.getElementById("result").innerHTML=
"❌ Wrong<br><br>Correct answer: "
+q.a[q.correct]+
"<br><br>Score: "
+score+"/"+questions.length;

}

}

function nextQuestion(){

current++;

if(current>=questions.length){

current=0;

}

showQuestion();

}
function showMistakes(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("question").innerHTML="❌ Mistakes";

if(mistakes.length===0){

document.getElementById("answers").innerHTML=
"<p>No mistakes yet ✅</p>";

}else{

let html="";

mistakes.forEach((m,i)=>{

html+="<p>"+(i+1)+". "+m+"</p>";

});

document.getElementById("answers").innerHTML=html;

}

document.getElementById("result").innerHTML="";

}
</script>

</body>
</html>
