{q:"Captain, explain Master's responsibility for cadets.",key:["duties","training","supervision","not cheap labour"]}  
];

const scenarios=[
{title:"Seaman left behind",question:"A crew member is hospitalised ashore and vessel is ready to sail. What do you do?",points:["olb","list of crew","agent","proper officer","owner","p&i","safe manning"]},
{title:"Missing crew before departure",question:"Crew member failed to return from shore leave before departure. Actions?",points:["search","agent","immigration","proper officer","owner","olb","crew list","safe manning"]},
{title:"Death onboard",question:"Crew member dies onboard. What are your actions?",points:["medical guide","owner","next of kin","maib","olb","body","property","rbd"]},
{title:"Major injury",question:"Crew member suffers fracture onboard. What reports and actions?",points:["medical care","maib","24 hours","olb","evidence","safety officer"]},
{title:"Oil pollution",question:"Oil discharged overboard in UK waters. Immediate actions?",points:["stop","sopep","contain","report","authorities","olb","maib"]},
{title:"Port State Control detention",question:"PSC finds serious MLC breaches and threatens detention. What do you do?",points:["rectify","company","mca","evidence","crew welfare","release"]},
{title:"Fire drill not possible",question:"Monthly drill cannot be held because weather makes it unsafe. What do you record?",points:["olb","reason","unsafe","next opportunity"]},
{title:"OLB wrong entry",question:"You find wrong name entered in OLB. How do you correct it?",points:["further entry","sign","refer","amend"]},
{title:"Lost Certificate of Registry abroad",question:"Certificate of Registry lost abroad. What do you do?",points:["proper officer","declaration","provisional certificate","ship particulars"]},
{title:"SSAS activation",question:"Security threat detected and SSAS activated. What do you expect?",points:["covert","24 hour contact","nmoc","security plan","company"]}
];

let current=0, score=0, mistakes=[], currentTopic="", currentSlide=0;
let questionQueue=[];
let queueIndex=0;

function hideNext(){document.getElementById("nextBtn").style.display="none";}
function showNext(){document.getElementById("nextBtn").style.display="block";}
function backToMenu(){document.getElementById("quiz").style.display="none";document.getElementById("menu").style.display="block";showNext();}

function startQuiz(){
showNext();
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

questionQueue=[...questions].sort(()=>0.5-Math.random());
queueIndex=0;
current=questions.indexOf(questionQueue[queueIndex]);

showQuestion();
}
function showQuestion(){showNext();document.getElementById("result").innerHTML="";let q=questions[current];document.getElementById("question").innerHTML=q.topic+"<br><br>"+q.q;let html="";q.a.forEach((answer,index)=>{html+=`<button class='answer' onclick='check(${index})'>${answer}</button>`;});document.getElementById("answers").innerHTML=html;}
function check(answer){let q=questions[current];if(answer===q.correct){score++;document.getElementById("result").innerHTML="✅ Correct | Score: "+score+"/"+questions.length;}else{mistakes.push(q.topic+": "+q.q);document.getElementById("result").innerHTML="❌ Wrong<br><br>Correct answer: "+q.a[q.correct]+"<br><br>Score: "+score+"/"+questions.length;}}
function nextQuestion(){
queueIndex++;

if(queueIndex>=questionQueue.length){
questionQueue=[...questions].sort(()=>0.5-Math.random());
queueIndex=0;
}

current=questions.indexOf(questionQueue[queueIndex]);
showQuestion();
}
function startExam(){hideNext();score=0;let exam=[...questions].sort(()=>0.5-Math.random()).slice(0,20);let i=0;document.getElementById("menu").style.display="none";document.getElementById("quiz").style.display="block";function showExam(){let q=exam[i];document.getElementById("result").innerHTML="";document.getElementById("question").innerHTML="Question "+(i+1)+"/20<br><br>"+q.topic+"<br><br>"+q.q;let html="";q.a.forEach((answer,index)=>{html+=`<button class='answer' onclick='checkExam(${index})'>${answer}</button>`;});document.getElementById("answers").innerHTML=html;}window.checkExam=function(answer){let q=exam[i];if(answer===q.correct){score++;}else{mistakes.push(q.topic+": "+q.q);}i++;if(i>=exam.length){document.getElementById("question").innerHTML="🎓 Exam Finished";document.getElementById("answers").innerHTML="<h2>Score: "+score+"/20</h2>";document.getElementById("result").innerHTML="";return;}showExam();};showExam();}

function startOral(){hideNext();document.getElementById("menu").style.display="none";document.getElementById("quiz").style.display="block";let q=oralQuestions[Math.floor(Math.random()*oralQuestions.length)];window.currentOral=q;document.getElementById("question").innerHTML=q.q;document.getElementById("answers").innerHTML="<textarea id='oralAnswer'></textarea><button onclick='checkOral()'>Check My Answer</button>";document.getElementById("result").innerHTML="";}
function checkOral(){let answer=document.getElementById("oralAnswer").value.toLowerCase();let q=window.currentOral;let found=0, missed=[];q.key.forEach(k=>{if(answer.includes(k)){found++;}else{missed.push(k);}});document.getElementById("result").innerHTML="Score: "+found+"/"+q.key.length+"<br><br>Missed points:<br>"+missed.join("<br>");}

function startScenario(){hideNext();document.getElementById("menu").style.display="none";document.getElementById("quiz").style.display="block";let s=scenarios[Math.floor(Math.random()*scenarios.length)];window.currentScenario=s;document.getElementById("question").innerHTML="🚨 "+s.title+"<br><br>"+s.question;document.getElementById("answers").innerHTML="<textarea id='scenarioAnswer'></textarea><button onclick='checkScenario()'>Submit</button>";document.getElementById("result").innerHTML="";}
function checkScenario(){let answer=document.getElementById("scenarioAnswer").value.toLowerCase();let s=window.currentScenario;let found=0, missed=[];s.points.forEach(p=>{if(answer.includes(p)){found++;}else{missed.push(p);}});document.getElementById("result").innerHTML="Score: "+found+"/"+s.points.length+"<br><br>Missing points:<br>"+missed.join("<br>");}

function showProgress(){hideNext();document.getElementById("menu").style.display="none";document.getElementById("quiz").style.display="block";let percent=Math.round((score/questions.length)*100);document.getElementById("question").innerHTML="📊 Progress";document.getElementById("answers").innerHTML="<p>Total Questions: "+questions.length+"</p><p>Current Score: "+score+"</p><p>Progress: "+percent+"%</p><p>Mistakes: "+mistakes.length+"</p>";document.getElementById("result").innerHTML="";}
function showMistakes(){hideNext();document.getElementById("menu").style.display="none";document.getElementById("quiz").style.display="block";document.getElementById("question").innerHTML="❌ Mistakes";document.getElementById("answers").innerHTML=mistakes.length?mistakes.map((m,i)=>"<p>"+(i+1)+". "+m+"</p>").join(""):"<p>No mistakes yet ✅</p>";document.getElementById("result").innerHTML="";}

function showStudy(){hideNext();document.getElementById("menu").style.display="none";document.getElementById("quiz").style.display="block";document.getElementById("question").innerHTML="📚 Study Mode";let html="";Object.keys(studyData).forEach(t=>{html+="<button onclick='studyTopic(\""+t+"\")'>"+t+"</button>";});document.getElementById("answers").innerHTML=html;document.getElementById("result").innerHTML="";}
function studyTopic(topic){currentTopic=topic;currentSlide=0;showSlide();}
function showSlide(){hideNext();let slides=studyData[currentTopic];document.getElementById("question").innerHTML="📚 "+currentTopic+"<br><br>Slide "+(currentSlide+1)+"/"+slides.length;document.getElementById("answers").innerHTML="<p>"+slides[currentSlide]+"</p><button onclick='prevSlide()'>⬅ Previous</button><button onclick='nextSlideStudy()'>Next ➡</button>";document.getElementById("result").innerHTML="";}
function nextSlideStudy(){if(currentSlide<studyData[currentTopic].length-1){currentSlide++;showSlide();}}
function prevSlide(){if(currentSlide>0){currentSlide--;showSlide();}}
</script>
