<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>UKFSE Trainer by Captain Tkachenko</title>
<style>
:root{
  --bg:#04111f;--panel:#071b31;--panel2:rgba(7,27,49,.88);--text:#f4f8ff;--muted:#b9c8d8;--blue:#1d8bd6;--blue2:#0c5f9d;--gold:#f7c948;--danger:#e8505b;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
body:before{content:"";position:fixed;inset:0;background:linear-gradient(135deg,rgba(2,8,23,.94),rgba(4,35,64,.9)),url('captain%203.jpg') center/cover no-repeat;filter:saturate(.9);z-index:-3}
body:after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.035) 0 1px,transparent 1px 18px),radial-gradient(circle at 50% 0%,rgba(58,166,255,.18),transparent 50%);z-index:-2;pointer-events:none}
.app{width:min(1120px,100%);margin:0 auto;padding:22px 18px 80px}
.hero{position:relative;overflow:hidden;border:1px solid rgba(125,211,252,.25);border-radius:30px;background:linear-gradient(160deg,rgba(5,25,50,.92),rgba(2,9,25,.96));box-shadow:0 20px 60px rgba(0,0,0,.45);padding:28px;margin-bottom:22px;text-align:center}
.hero:before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,rgba(29,139,214,.16),transparent 40%);animation:float 10s linear infinite;pointer-events:none}
@keyframes float{0%{transform:translateX(-5%)}50%{transform:translateX(5%)}100%{transform:translateX(-5%)}}
.brandRow{position:relative;display:flex;align-items:center;justify-content:center;gap:28px;flex-wrap:wrap;margin-bottom:20px}
.creatorPhoto{width:148px;height:148px;border-radius:50%;object-fit:cover;border:4px solid #58a6ff;box-shadow:0 0 28px rgba(88,166,255,.75)}
.patchImg{width:104px;height:104px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(247,201,72,.55))}
.title{position:relative;margin:8px 0 4px;font-size:clamp(34px,6vw,64px);letter-spacing:.5px;color:#dff3ff;text-shadow:0 4px 24px rgba(88,166,255,.35)}
.subtitle{position:relative;margin:0;color:var(--muted);font-size:clamp(15px,2.2vw,20px)}
.linkedin{position:relative;display:inline-block;margin-top:18px;padding:14px 24px;border-radius:999px;background:linear-gradient(135deg,#0a66c2,#1da1f2);color:white;text-decoration:none;font-weight:800;box-shadow:0 10px 24px rgba(0,0,0,.35)}
.panel{border:1px solid rgba(125,211,252,.22);border-radius:28px;background:var(--panel2);box-shadow:0 18px 48px rgba(0,0,0,.38);padding:28px;margin:18px auto;max-width:920px;text-align:center;backdrop-filter:blur(8px)}
.panelTitle{font-size:clamp(28px,4vw,42px);margin:8px 0 24px;color:white}.kicker{color:#7dd3fc;font-size:18px;font-weight:800;margin-bottom:8px}
.modeGrid,.studyList{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.modeGrid{max-width:780px;margin:0 auto}.studyList{max-width:860px;margin:0 auto}.btn,.modeBtn,.studyBtn,.answerBtn,.actionBtn{appearance:none;border:none;border-radius:18px;padding:17px 18px;font-size:19px;font-weight:800;color:white;background:linear-gradient(135deg,var(--blue2),var(--blue));box-shadow:0 8px 20px rgba(0,0,0,.28);cursor:pointer;text-align:center}.modeBtn:nth-child(7),.danger{background:linear-gradient(135deg,#9d1c2b,#e8505b)}.answerBtn{display:block;width:100%;margin:12px 0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16)}.answerBtn:disabled{opacity:.55}.actionBtn{margin-top:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18)}
.contentText{font-size:20px;line-height:1.55;text-align:left;color:#edf6ff}.meta{color:#7dd3fc;font-weight:800}.result{font-size:20px;line-height:1.5}.textarea{width:100%;min-height:160px;border-radius:18px;border:1px solid rgba(125,211,252,.28);background:rgba(2,8,23,.72);color:white;padding:16px;font-size:18px;outline:none}.topActions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}.footer{text-align:center;color:#9fb4c9;font-size:14px;margin:30px 0}.progressBar{height:14px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin:14px 0}.progressFill{height:100%;width:0%;background:linear-gradient(90deg,#1da1f2,#7dd3fc)}
.wave{position:fixed;left:0;right:0;bottom:0;height:76px;background:linear-gradient(0deg,rgba(29,139,214,.26),transparent);z-index:-1}
@media(max-width:700px){.app{padding:14px 12px 70px}.hero{padding:22px 14px;border-radius:26px}.brandRow{gap:14px}.creatorPhoto{width:116px;height:116px}.patchImg{width:72px;height:72px}.panel{padding:20px 14px;border-radius:24px}.modeGrid,.studyList{grid-template-columns:1fr;gap:12px}.modeBtn,.studyBtn,.answerBtn,.actionBtn{width:100%;font-size:18px;padding:16px;border-radius:18px}.contentText{font-size:18px}.linkedin{width:100%;padding:14px 18px}.topActions{display:block}.topActions .actionBtn{width:100%}}
</style>
</head>
<body>
<div class="app">
  <section class="hero">
    <div class="brandRow">
      <img src="patch1_transparent.png" onerror="this.src='pATCH%201.jpg'" class="patchImg" alt="Patch 1">
      <img src="captain%203.jpg" class="creatorPhoto" alt="Captain Kyrylo Tkachenko">
      <img src="patch2_transparent.png" onerror="this.src='PATCH%202.jpg'" class="patchImg" alt="Patch 2">
    </div>
    <h1 class="title">⚓ UKFSE Trainer</h1>
    <p class="subtitle">UKFSE / UKLAP Grade 1 Master preparation platform<br>Created by <b>Captain Kyrylo Tkachenko</b></p>
    <a class="linkedin" href="https://www.linkedin.com/in/captain-kyrylo-tkachenko/" target="_blank">Follow Captain Tkachenko on LinkedIn</a>
  </section>

  <section id="menu" class="panel">
    <div class="kicker">Training Console</div>
    <h2 class="panelTitle">Choose Mode</h2>
    <div class="modeGrid">
      <button class="modeBtn" onclick="showStudy()">📚 Study Mode</button>
      <button class="modeBtn" onclick="startQuiz()">⚡ Quick Test</button>
      <button class="modeBtn" onclick="startExam()">🎓 Full Exam</button>
      <button class="modeBtn" onclick="startOral()">🎤 Oral Exam</button>
      <button class="modeBtn" onclick="startScenario()">🚨 Emergency Scenarios</button>
      <button class="modeBtn" onclick="showProgress()">📊 Progress</button>
      <button class="modeBtn" onclick="showMistakes()">❌ Mistakes</button>
      <button class="modeBtn danger" onclick="resetSession()">Reset Session</button>
    </div>
  </section>

  <section id="screen" class="panel" style="display:none">
    <div id="kicker" class="kicker"></div>
    <h2 id="question" class="panelTitle"></h2>
    <div id="answers"></div>
    <div id="result" class="result"></div>
    <div class="topActions">
      <button id="nextBtn" class="actionBtn" onclick="nextQuestion()">Next Question</button>
      <button class="actionBtn" onclick="backToMenu()">⬅ Back to Menu</button>
    </div>
  </section>

  <div class="footer">⚓ Built for UKFSE / UKLAP Grade 1 Master preparation · Captain Kyrylo Tkachenko</div>
</div>
<div class="wave"></div>
<script>
const baseQuestions=[
['HSSC','How many survey types are defined under HSSC?',['5','6','7','8'],2],['HSSC','Which survey is a complete inspection before a ship is put into service?',['Annual','Initial','Intermediate','Additional'],1],['HSSC','Which survey leads to issue of a new certificate?',['Annual','Renewal','Intermediate','Bottom inspection'],1],['HSSC','Which survey is carried out after important repairs or renewals?',['Additional','Annual','Periodical','Intermediate'],0],['Certificates','Cargo ship 300 GT or more on international voyages requires:',['Cargo Ship Safety Radio Certificate','Passenger Ship Safety Certificate','Fishing Certificate','MLC only'],0],['Certificates','Cargo ship 500 GT or more requires Safety Equipment Certificate.',['True','False','Only passenger ships','Only tankers'],0],['Certificates','Most HSSC certificates are valid maximum:',['1 year','3 years','5 years','10 years'],2],['ISM','Under ISM the company must hold:',['DOC','CSR','OLB','SEA'],0],['ISM','Under ISM the ship must hold:',['SMC','Passport list','CBA','Port clearance'],0],['ISM','SMS includes procedures for:',['Emergency situations','Salary only','Cargo sale','Crew entertainment'],0],['ISPS','ISPS Code relates to:',['Security','Food','Wages','Loadline'],0],['ISPS','SSAS means:',['Ship Security Alert System','Ship Safety Annual Survey','Safety Steering Alarm System','Crew report'],0],['ISPS','ISPS applies to cargo ships on international voyages of:',['300 GT+','500 GT+','1000 GT+','All boats'],1],['MLC','Minimum age to work onboard is generally:',['14','15','16','18'],2],['MLC','Young seafarers under 18 generally must not work:',['At night','On deck','In port','With officers'],0],['MLC','SEA minimum notice period is normally:',['24 hours','3 days','7 days','30 days'],2],['MLC','If SEA is not in English, onboard must be:',['English translation','Extra passport','Radio log','New medical'],0],['MLC','Late wage payment may attract interest of:',['5%','10%','20%','50%'],2],['OLB','OLB drill entries must be signed by:',['Master and one crew member','Agent only','Cook only','PSC only'],0],['OLB','Steering gear must be tested:',['Within 12 hours before sailing','Once per year','Only drydock','After arrival'],0],['OLB','Wrong OLB entry should be corrected by:',['Further signed entry','Deleting it','Correction fluid','Ignoring it'],0],['MAIB','Accident report to MAIB should normally be within:',['24 hours','7 days','14 days','1 month'],0],['MAIB','Evidence after accident must be preserved normally for:',['28 days unless released','3 days','7 days','5 years'],0],['Drills','Each crew member must participate monthly in:',['Fire and abandon ship drills','Only cleaning','Payroll check','Only toolbox'],0],['Drills','If 25% crew changed, drills within:',['24h of leaving port','7 days','1 month','Next drydock'],0],['Safety','Ship with five or more persons requires:',['Safety Officer','Extra cook','Pilot','Doctor'],0],['Safety','Safety Committee is chaired by:',['Master','Agent','Cook','PSC'],0],['Registry','Certificate of British Registry proves:',['Nationality and tonnages','Ownership','ISM compliance','Crew competence'],0],['CSR','CSR provides record of:',['History of the ship','Crew wages','Food menu','Weather'],0],['Consul','British Consul acts as:',['Proper officer','Shipowner','Safety officer','PSC inspector'],0],['Left Behind','Seaman left behind includes:',['Hospitalised, absent, detained or imprisoned','Only dead','Only on leave','Only dismissed'],0],['Penalties','Major oil pollution offences may carry maximum fine of:',['£250,000','£5,000','£500','£30,000'],0],['PSC','Port State Control detention means:',['Ship prohibited from sailing due deficiencies','Weather delay','Cargo delay','Customs only'],0],['Safe Manning','If crew falls below Safe Manning:',['Inform company and assess voyage safety','Continue normally','Ignore','Increase speed'],0],['Stowaways','If stowaway found, first priority is:',['Safety, security and inform company/authorities','Hide him','Put ashore anywhere','Ignore'],0]
];
const questions=[]; for(let r=0;r<10;r++){baseQuestions.forEach((x,i)=>questions.push({topic:x[0],q:x[1],a:x[2],correct:x[3]}));}
const studyData={
'HSSC Surveys':['HSSC = Harmonised System of Survey and Certification.','Seven surveys: Initial, Periodical, Renewal, Intermediate, Annual, Bottom Inspection and Additional.','Initial survey is before ship enters service.','Renewal survey leads to a new certificate.','Additional survey is after important repair or renewal.'],
'Certificates':['Cargo ship 300 GT+ needs Safety Radio Certificate.','Cargo ship 500 GT+ needs Safety Equipment and Safety Construction Certificate.','Passenger Ship Safety Certificate is normally annual.','Most HSSC certificates have maximum 5-year validity.'],
'ISM Code':['ISM = International Safety Management Code.','Company must hold DOC. Ship must hold SMC.','SMS includes safe operation, pollution prevention, emergency preparedness and internal audits.','Master has overriding authority for safety and pollution prevention.'],
'ISPS Code':['ISPS relates to ship and port security.','SSP = Ship Security Plan. SSA = Ship Security Assessment.','SSAS sends covert security alert to nominated contacts.','Security levels: 1 normal, 2 heightened, 3 exceptional.'],
'MLC':['MLC protects seafarers working and living conditions.','Covers SEA, wages, repatriation, food, accommodation and medical care.','Minimum age generally 16. Young seafarers have night work restrictions.','English translation of SEA must be onboard if SEA is not in English.'],
'Official Log Book':['OLB records official ship events, drills, inspections, accidents, complaints and changes.','Drill entries signed by Master and one crew member.','Steering gear tested within 12 hours before sailing.','Wrong entries corrected by further signed entry, not erased.'],
'MAIB':['MAIB investigates accidents to improve safety, not to punish.','Report accidents by quickest means, normally within 24 hours.','Preserve charts, logbooks, VDR/electronic records and equipment.','Serious injuries may be reported within 14 days.'],
'Musters & Drills':['Monthly fire and abandon ship drills.','If more than 25% crew changed, drills within 24 hours of leaving port.','Muster list kept updated by Master.','Passenger muster within 24 hours for voyages over 24 hours.'],
'Safety':['Safety Officer required where five or more persons are employed.','Safety Officer inspections at least every 3 months.','Safety Committee chaired by Master.','Risk assessments cover all work activities onboard.'],
'Registry & CSR':['Certificate of British Registry proves nationality and tonnage, not ownership.','CSR = Continuous Synopsis Record, history of the ship.','If registry certificate lost abroad, apply for Provisional Certificate via Proper Officer.'],
'Consul & Left Behind':['British Consul acts as proper officer abroad.','Can assist with crew, wages, OLB, protests, deaths and repatriation.','Seaman left behind must be recorded in OLB and List of Crew; inform agent, proper officer, owner and P&I.'],
'Penalties & Detention':['Ship may be detained for serious MLC breaches or hazardous conditions.','Oil pollution offences may carry very high fines.','Release may require rectification, proceedings concluded, costs/fines paid or security.'],
'STCW Manila':['STCW sets standards for training, certification and watchkeeping.','Manila amendments updated rest hours, security training, ECDIS and refresher training.','Medical fitness and competency standards were also updated.'],
'Safe Manning':['Safe Manning Document states minimum required manning.','If below safe manning, inform company and assess whether vessel may proceed.','Replacement may be required before sailing.'],
'PSC':['PSC may inspect certificates, crew, condition and MLC compliance.','Serious deficiencies can lead to detention.','Master should cooperate, rectify and notify company/flag.'],
'Stowaways':['Ensure safety and security, inform company and authorities.','Search vessel, protect evidence and maintain humane treatment.','Do not disembark without authority.']
};
const oralQuestions=[
['Captain, explain the seven HSSC survey types.',['initial','periodical','renewal','intermediate','annual','bottom','additional']],['Captain, difference between annual and renewal survey?',['annual','renewal','certificate']],['Captain, ISM duties for company and ship?',['doc','smc','sms','emergency']],['Captain, purpose of ISPS Code?',['security','ship security plan','illegal']],['Captain, explain SEA requirements.',['seafarer employment agreement','signed','copy','english']],['Captain, MAIB reporting requirement.',['24 hours','quickest','accident']],['Captain, OLB correction procedure.',['further entry','signed','not erased']],['Captain, actions if seaman left behind abroad.',['olb','list of crew','proper officer','agent','owner']],['Captain, what is CSR?',['continuous synopsis record','history','ship']],['Captain, Safety Officer duties.',['inspection','coswp','stop work','master']]
];
const scenarios=[
['Seaman left behind','Crew member is hospitalised ashore and vessel ready to sail.',['olb','list of crew','agent','proper officer','owner','p&i','safe manning']],['Oil pollution','Oil discharged overboard in UK waters.',['stop','sopep','contain','report','authorities','olb']],['Death onboard','Crew member dies onboard.',['medical guide','owner','next of kin','maib','olb','body','property']],['PSC detention','PSC finds serious deficiencies.',['rectify','company','flag','crew welfare','evidence','release']],['SSAS activation','Security threat detected and SSAS activated.',['covert','24 hour contact','nmoc','security plan','company']]
];
let score=0,mistakes=[],mode='',queue=[],idx=0,answered=false,current=null,slide=0,currentTopic='',oralQueue=[],scenarioQueue=[];
const menu=document.getElementById('menu'),screen=document.getElementById('screen'),question=document.getElementById('question'),answers=document.getElementById('answers'),result=document.getElementById('result'),kicker=document.getElementById('kicker'),nextBtn=document.getElementById('nextBtn');
function shuffle(a){return [...a].sort(()=>Math.random()-.5)} function showScreen(){menu.style.display='none';screen.style.display='block'} function hideNext(){nextBtn.style.display='none'} function showNext(){nextBtn.style.display='inline-block'} function backToMenu(){screen.style.display='none';menu.style.display='block';showNext()} function resetSession(){score=0;mistakes=[];alert('Session reset')}
function startQuiz(){mode='quiz';score=0;queue=shuffle(questions);idx=0;showScreen();showNext();showQuestion()} function showQuestion(){answered=false;current=queue[idx];kicker.textContent=current.topic;question.innerHTML='Question '+(idx+1)+'/'+queue.length+'<br>'+current.q;answers.innerHTML=current.a.map((x,i)=>`<button class="answerBtn" onclick="check(${i})">${x}</button>`).join('');result.innerHTML=''} function check(i){if(answered)return;answered=true;document.querySelectorAll('.answerBtn').forEach(b=>{b.disabled=true;b.style.opacity=.55});if(i===current.correct){score++;result.innerHTML='✅ Correct · Score '+score+'/'+queue.length}else{mistakes.push(current.topic+': '+current.q);result.innerHTML='❌ Wrong<br>Correct: '+current.a[current.correct]+'<br>Score '+score+'/'+queue.length}} function nextQuestion(){if(mode!=='quiz'){return} if(!answered){result.innerHTML='Answer first.';return} idx++; if(idx>=queue.length){hideNext();kicker.textContent='Finished';question.textContent='Quick Test Finished';answers.innerHTML='<h2>Score: '+score+'/'+queue.length+'</h2>';result.innerHTML='All questions completed.';return} showQuestion()}
function startExam(){mode='exam';score=0;queue=shuffle(questions).slice(0,50);idx=0;showScreen();hideNext();showExam()} function showExam(){answered=false;current=queue[idx];kicker.textContent='Full Exam';question.innerHTML='Question '+(idx+1)+'/'+queue.length+'<br>'+current.topic+'<br>'+current.q;answers.innerHTML=current.a.map((x,i)=>`<button class="answerBtn" onclick="checkExam(${i})">${x}</button>`).join('');result.innerHTML=''} function checkExam(i){if(answered)return;answered=true;if(i===current.correct)score++;else mistakes.push(current.topic+': '+current.q);idx++; if(idx>=queue.length){question.textContent='Full Exam Finished';answers.innerHTML='<h2>Score: '+score+'/'+queue.length+'</h2>';result.innerHTML='Return to menu to start a new exam.';return} showExam()}
function showStudy(){showScreen();hideNext();kicker.textContent='Study Mode';question.textContent='Choose Study Module';answers.innerHTML='<div class="studyList">'+Object.keys(studyData).map(t=>`<button class="studyBtn" onclick="studyTopic('${t}')">${t}</button>`).join('')+'</div>';result.innerHTML=''} function studyTopic(t){currentTopic=t;slide=0;showSlide()} function showSlide(){let s=studyData[currentTopic];kicker.textContent=currentTopic;question.innerHTML='Slide '+(slide+1)+'/'+s.length;answers.innerHTML='<p class="contentText">'+s[slide]+'</p><div class="progressBar"><div class="progressFill" style="width:'+((slide+1)/s.length*100)+'%"></div></div><button class="actionBtn" onclick="prevSlide()">⬅ Previous</button><button class="actionBtn" onclick="nextSlide()">Next ➡</button>';result.innerHTML=''} function nextSlide(){let s=studyData[currentTopic]; if(slide<s.length-1){slide++;showSlide()}else{showStudy()}} function prevSlide(){if(slide>0){slide--;showSlide()}}
function startOral(){mode='oral';oralQueue=shuffle(oralQuestions);idx=0;showScreen();hideNext();showOral()} function showOral(){answered=false;current=oralQueue[idx];kicker.textContent='Oral Exam';question.innerHTML='Question '+(idx+1)+'/'+oralQueue.length+'<br>'+current[0];answers.innerHTML='<textarea class="textarea" id="oralAns"></textarea><button class="actionBtn" onclick="checkOral()">Check Answer</button>';result.innerHTML=''} function checkOral(){if(answered)return;answered=true;let ans=document.getElementById('oralAns').value.toLowerCase();let found=0,miss=[];current[1].forEach(k=>ans.includes(k)?found++:miss.push(k));result.innerHTML='Score: '+found+'/'+current[1].length+'<br>Missing: '+miss.join(', ');setTimeout(()=>{idx++; if(idx>=oralQueue.length){question.textContent='Oral Exam Finished';answers.innerHTML='';result.innerHTML='Return to menu.'}else showOral()},1800)}
function startScenario(){mode='scenario';scenarioQueue=shuffle(scenarios);idx=0;showScreen();hideNext();showScenario()} function showScenario(){answered=false;current=scenarioQueue[idx];kicker.textContent='Emergency Scenario';question.innerHTML='Scenario '+(idx+1)+'/'+scenarioQueue.length+'<br>'+current[0]+'<br>'+current[1];answers.innerHTML='<textarea class="textarea" id="scAns"></textarea><button class="actionBtn" onclick="checkScenario()">Submit</button>';result.innerHTML=''} function checkScenario(){if(answered)return;answered=true;let ans=document.getElementById('scAns').value.toLowerCase();let found=0,miss=[];current[2].forEach(k=>ans.includes(k)?found++:miss.push(k));result.innerHTML='Score: '+found+'/'+current[2].length+'<br>Missing: '+miss.join(', ');setTimeout(()=>{idx++; if(idx>=scenarioQueue.length){question.textContent='Scenarios Finished';answers.innerHTML='';result.innerHTML='Return to menu.'}else showScenario()},2200)}
function showProgress(){showScreen();hideNext();kicker.textContent='Progress';question.textContent='Session Progress';answers.innerHTML='<p class="contentText">Total question bank: '+questions.length+'<br>Current score: '+score+'<br>Mistakes saved: '+mistakes.length+'</p>';result.innerHTML=''} function showMistakes(){showScreen();hideNext();kicker.textContent='Mistakes';question.textContent='Mistakes';answers.innerHTML=mistakes.length?mistakes.map((m,i)=>'<p class="contentText">'+(i+1)+'. '+m+'</p>').join(''):'<p class="contentText">No mistakes yet ✅</p>';result.innerHTML=''}
</script>
</body>
</html>
